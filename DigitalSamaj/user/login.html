                "text-slate-900",
                "shadow-sm",
              );
              btn.classList.add("text-slate-600");
            });

            this.classList.add(
              "active",
              "bg-white",
              "text-slate-900",
              "shadow-sm",
            );
            this.classList.remove("text-slate-600");

            if (tab === "login") {
              loginForm.classList.remove("hidden");
              signupForm.classList.add("hidden");
              document.querySelector("#header-section h1").textContent =
                "Welcome Back";
              document.querySelector("#header-section p").textContent =
                "Sign in to access your community";
            } else {
              loginForm.classList.add("hidden");
              signupForm.classList.remove("hidden");
              document.querySelector("#header-section h1").textContent =
                "Join Our Community";
              document.querySelector("#header-section p").textContent =
                "Create your account to get started";
            }
          });
        });

        tabButtons[0].classList.add("bg-white", "text-slate-900", "shadow-sm");
      });

      function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const icon =
          input.nextElementSibling.nextElementSibling.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        }
      }
    </script>

    <script>
      (function () {
        function blockEvent(e) {
          if (!e) return false;
          if (typeof e.preventDefault === "function") e.preventDefault();
          if (typeof e.stopPropagation === "function") e.stopPropagation();
          if (typeof e.stopImmediatePropagation === "function")
            e.stopImmediatePropagation();
          return false;
        }

        // Block all anchor navigations (including http(s), mailto, tel, hash, fragments)
        document.addEventListener(
          "click",
          function (e) {
            var a =
              e.target && e.target.closest ? e.target.closest("a[href]") : null;
            if (!a) return;
            return blockEvent(e);
          },
          true,
        );

        // Neutralize programmatic navigation attempts
        try {
          window.open = function () {
            return null;
          };
        } catch (_) {}
        try {
          var noop = function () {};
          history.pushState = noop;
          history.replaceState = noop;
        } catch (_) {}
        try {
          if (window.location) {
            window.location.assign = function () {};
            window.location.replace = function () {};
          }
        } catch (_) {}
      })();
    </script>
